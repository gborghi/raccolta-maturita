name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Restore community plugins
        # Quartz 5 plugins live in github:quartz-community/* repos, pinned in
        # quartz.lock.json. `restore` clones them, builds each (tsup) and
        # generates .quartz/plugins/index.ts. `npx quartz build` does NOT run the
        # `prebuild` npm hook, so this must be an explicit step.
        run: npx quartz plugin restore
      - name: Build Quartz
        run: npx quartz build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
      - name: Password-protect SimZan (copyrighted) pages
        run: node protect_simzan.mjs
        env:
          SIMZAN_PASS: ${{ secrets.SIMZAN_PASS }}
      - name: Shrink heavy assets for low-RAM mobile
        run: node shrink_build.mjs
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
